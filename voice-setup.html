<!DOCTYPE html>
<html>

<head>
    <title>ConteXia Voice Activation</title>
    <style>
        body {
            background-color: #E0FDE4;
            background-image: url("/checkered.png");
            background-size: 128px;
            color: #064E3B;
            font-family: "Outfit", system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Grain effect */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            z-index: 1;
        }

        .container {
            max-width: 440px;
            width: 90%;
            padding: 3rem 2.5rem;
            background: rgba(209, 250, 218, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            z-index: 10;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #16A34A;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4B634E;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }

        button {
            width: 100%;
            background: #16A34A;
            color: #E0FDE4;
            border: none;
            padding: 1rem 2rem;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.15);
        }

        button:hover {
            transform: translateY(-2px);
            background: #15803D;
            box-shadow: 0 15px 30px rgba(22, 163, 74, 0.25);
        }

        button:active {
            transform: translateY(0);
        }

        .success {
            color: #15803D;
            font-weight: 800;
            font-size: 0.9rem;
            padding: 1rem;
            background: rgba(22, 163, 74, 0.05);
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Voice Activation</h1>
        <p>To enable hands-free interaction, ConteXia needs a one-time microphone authorization. Click below to
            activate.</p>
        <button id="grant">Allow Microphone</button>
        <div id="status" class="success">✓ Voice Enabled. You can close this tab.</div>
    </div>

    <script type="module" src="/src/voice-setup.js"></script>
</body>

</html>
